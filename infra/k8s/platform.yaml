apiVersion: v1
kind: Namespace
metadata:
  name: delivro
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: delivro-config
  namespace: delivro
data:
  NODE_ENV: production
  GATEWAY_PORT: "4000"
  AUTH_SERVICE_URL: "http://auth-service:4001"
  PRODUCT_SERVICE_URL: "http://product-service:4002"
  ORDER_SERVICE_URL: "http://order-service:4003"
  PAYMENT_SERVICE_URL: "http://payment-service:4004"
  DELIVERY_SERVICE_URL: "http://delivery-service:4005"
  AI_SERVICE_URL: "http://ai-service:4006"
  NOTIFICATION_SERVICE_URL: "http://notification-service:4007"
  NEXT_PUBLIC_API_URL: "https://api.example.com"
  NEXT_PUBLIC_WS_URL: "wss://api.example.com/api/delivery/track"
  NEXT_PUBLIC_SSE_URL: "https://api.example.com/api/delivery/track-sse"
---
apiVersion: v1
kind: Secret
metadata:
  name: delivro-secrets
  namespace: delivro
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:pass@postgres:5432/delivro"
  REDIS_URL: "redis://redis:6379"
  JWT_ACCESS_SECRET: "replace-this"
  JWT_REFRESH_SECRET: "replace-this"
  STRIPE_SECRET_KEY: "replace-this"
  STRIPE_WEBHOOK_SECRET: "replace-this"
  SMTP_HOST: "replace-this"
  SMTP_PORT: "587"
  SMTP_USER: "replace-this"
  SMTP_PASS: "replace-this"
  FIREBASE_PROJECT_ID: "replace-this"
  FIREBASE_CLIENT_EMAIL: "replace-this"
  FIREBASE_PRIVATE_KEY: "replace-this"
  FIREBASE_DATABASE_URL: "https://replace-this.firebaseio.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: delivro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/your-org/delivro-api-gateway:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: delivro-config
            - secretRef:
                name: delivro-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: delivro
spec:
  selector:
    app: api-gateway
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: delivro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/your-org/delivro-auth-service:latest
          ports:
            - containerPort: 4001
          envFrom:
            - configMapRef:
                name: delivro-config
            - secretRef:
                name: delivro-secrets
---
apiVersion: v1
