apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: delivro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/delivro-web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: delivro-config
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: delivro
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: delivro-ingress
  namespace: delivro
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  tls:
    - hosts:
        - app.example.com
        - api.example.com
      secretName: delivro-tls
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 4000
