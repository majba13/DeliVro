name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run typecheck
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - image: delivro-api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - image: delivro-auth-service
            dockerfile: services/auth-service/Dockerfile
          - image: delivro-product-service
            dockerfile: services/product-service/Dockerfile
          - image: delivro-order-service
            dockerfile: services/order-service/Dockerfile
          - image: delivro-payment-service
            dockerfile: services/payment-service/Dockerfile
          - image: delivro-delivery-service
            dockerfile: services/delivery-service/Dockerfile
          - image: delivro-ai-service
            dockerfile: services/ai-service/Dockerfile
          - image: delivro-notification-service
            dockerfile: services/notification-service/Dockerfile
          - image: delivro-web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
      - name: Deploy manifests
        run: kubectl apply -f infra/k8s/platform.yaml
